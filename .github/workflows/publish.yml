name: Publish (TestPyPI)

# Exercises the real publish pipeline against TestPyPI: builds PyPI-valid wheels
# (manylinux on Linux, native on macOS) with the sidecar bundled, plus an sdist,
# and publishes via OIDC trusted publishing (no stored token).
#
# Trigger on a tag, or manually (workflow_dispatch) for a dry test run.
# Switching to real PyPI later = drop the `repository-url` line and register the
# trusted publisher on pypi.org instead (ideally from the authoritative repo).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  linux-wheel:
    name: Wheel (linux x86_64 — manylinux_2_17 + musllinux_1_2)
    runs-on: ubuntu-latest
    # Static-musl sidecar (via cargo-zigbuild) has NO glibc dependency, so one
    # binary serves both a broad manylinux_2_17 wheel (glibc >= 2.17: Amazon
    # Linux 2, CentOS 7, and newer) and a musllinux_1_2 wheel (Alpine). No
    # manylinux build container needed.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build static-musl bundled wheels (manylinux_2_17 + musllinux_1_2)
        run: |
          set -euo pipefail
          # cargo-zigbuild + zig come from PyPI (ziglang); no extra system deps.
          python -m pip install --upgrade build wheel cargo-zigbuild ziglang
          bash clients/python/build_wheel.sh x86_64-unknown-linux-musl
          cd clients/python/dist
          base=$(ls *.whl)
          python -m wheel tags --platform-tag manylinux_2_17_x86_64 "$base"
          python -m wheel tags --platform-tag musllinux_1_2_x86_64 "$base"
          rm -f "$base"
          ls -1
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: clients/python/dist/*.whl

  macos-wheel:
    name: Wheel (macOS arm64 + x86_64)
    # Both wheels build on the arm64 runner; x86_64 is cross-compiled. The Intel
    # macos-13 image is deprecated and its runner pool is starved, so we no
    # longer depend on it.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build wheel
      - name: Build arm64 wheel (native)
        run: |
          set -euo pipefail
          bash clients/python/build_wheel.sh
          mkdir -p staged
          mv clients/python/dist/*.whl staged/
      - name: Build x86_64 wheel (cross-compiled, relabeled)
        run: |
          set -euo pipefail
          bash clients/python/build_wheel.sh x86_64-apple-darwin
          python -m wheel tags --platform-tag macosx_11_0_x86_64 --remove clients/python/dist/*.whl
          mv clients/python/dist/*.whl staged/
      - name: List wheels
        run: ls -1 staged/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos
          path: staged/*.whl

  linux-wheel-aarch64:
    name: Wheel (linux aarch64 — manylinux_2_17 + musllinux_1_2)
    runs-on: ubuntu-24.04-arm # native ARM runner (free on public repos)
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build static-musl bundled wheels (manylinux_2_17 + musllinux_1_2)
        run: |
          set -euo pipefail
          python -m pip install --upgrade build wheel cargo-zigbuild ziglang
          bash clients/python/build_wheel.sh aarch64-unknown-linux-musl
          cd clients/python/dist
          base=$(ls *.whl)
          python -m wheel tags --platform-tag manylinux_2_17_aarch64 "$base"
          python -m wheel tags --platform-tag musllinux_1_2_aarch64 "$base"
          rm -f "$base"
          ls -1
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64
          path: clients/python/dist/*.whl

  windows-wheel:
    name: Wheel (windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -m pip install --upgrade build wheel
      # GitHub's Windows runners provide Git Bash; build_wheel.sh handles the .exe.
      - run: bash clients/python/build_wheel.sh
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: clients/python/dist/*.whl

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [linux-wheel, linux-wheel-aarch64, macos-wheel, windows-wheel]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          # TestPyPI/PyPI forbid re-uploading an existing filename. Skip files
          # already present so re-runs (and re-tagging the same version during
          # alpha) are idempotent instead of failing the whole job.
          skip-existing: true
