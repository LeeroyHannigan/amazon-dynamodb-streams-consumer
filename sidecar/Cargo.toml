[package]
name = "ddbstreams-kcl-sidecar"
version = "0.0.1"
edition = "2021"
description = "JVM-free language-binding sidecar for ddbstreams-kcl. Runs the full Rust consumer (shard discovery, leases, ordering, checkpoints) and streams ordered record batches to a thin language client over stdio using the JSON-Lines protocol; the client acks with a checkpoint. The MultiLangDaemon analog, without a JVM."

[[bin]]
name = "ddbstreams-kcl-sidecar"
path = "src/main.rs"

[dependencies]
ddbstreams-kcl-core = { path = "../core" }
ddbstreams-kcl-protocol = { path = "../protocol" }
ddbstreams-kcl-source-ddbstreams = { path = "../source-ddbstreams", features = ["aws"] }
ddbstreams-kcl-lease-dynamodb = { path = "../lease-dynamodb", features = ["aws"] }
ddbstreams-kcl-worker = { path = "../worker", features = ["aws"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "io-util", "sync", "signal", "time"] }
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-util", "sync", "time", "process"] }
aws-config = { version = "1" }
aws-sdk-dynamodb = { version = "1" }
aws-sdk-dynamodbstreams = { version = "1" }
